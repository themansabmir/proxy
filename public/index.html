<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Proxy Control Center</title>
    <style>
        body { font-family: -apple-system, sans-serif; background: #f4f7f6; padding: 40px; color: #333; }
        .container { max-width: 640px; margin: 0 auto; background: white; padding: 20px; border-radius: 12px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); }
        h1 { font-size: 24px; margin-bottom: 20px; border-bottom: 2px solid #eee; padding-bottom: 10px; }

        .proxy-item { padding: 14px 0; border-bottom: 1px solid #eee; }
        .proxy-item:last-child { border-bottom: none; }

        .proxy-row { display: flex; justify-content: space-between; align-items: center; }
        .info { display: flex; flex-direction: column; gap: 2px; }
        .id { font-weight: bold; text-transform: capitalize; }
        .url { font-size: 12px; color: #666; }

        .actions { display: flex; align-items: center; gap: 12px; }

        /* Edit button */
        .edit-btn { background: none; border: none; cursor: pointer; font-size: 16px; color: #888; padding: 2px 4px; }
        .edit-btn:hover { color: #333; }

        /* Inline edit form */
        .edit-form { display: none; margin-top: 10px; gap: 8px; align-items: center; }
        .edit-form.open { display: flex; }
        .edit-form input { flex: 1; padding: 6px 10px; border: 1px solid #ccc; border-radius: 6px; font-size: 13px; }
        .save-btn { padding: 6px 14px; background: #2ecc71; color: white; border: none; border-radius: 6px; cursor: pointer; font-size: 13px; }
        .save-btn:hover { background: #27ae60; }
        .cancel-btn { padding: 6px 10px; background: #eee; border: none; border-radius: 6px; cursor: pointer; font-size: 13px; }
        .cancel-btn:hover { background: #ddd; }

        /* Toggle Switch */
        .switch { position: relative; display: inline-block; width: 50px; height: 24px; flex-shrink: 0; }
        .switch input { opacity: 0; width: 0; height: 0; }
        .slider { position: absolute; cursor: pointer; top: 0; left: 0; right: 0; bottom: 0; background-color: #ccc; transition: .4s; border-radius: 34px; }
        .slider:before { position: absolute; content: ""; height: 18px; width: 18px; left: 4px; bottom: 3px; background-color: white; transition: .4s; border-radius: 50%; }
        input:checked + .slider { background-color: #2ecc71; }
        input:checked + .slider:before { transform: translateX(24px); }

        .toast { position: fixed; bottom: 24px; right: 24px; background: #333; color: white; padding: 10px 18px; border-radius: 8px; font-size: 13px; opacity: 0; transition: opacity 0.3s; pointer-events: none; }
        .toast.show { opacity: 1; }
    </style>
</head>
<body>

<div class="container">
    <h1>Proxy Destinations</h1>
    
    <!-- Add Form -->
    <div style="background: #fdfdfd; padding: 15px; border: 2px dashed #eee; border-radius: 8px; margin-bottom: 30px;">
        <h3 style="margin: 0 0 12px 0; font-size: 15px;">+ Add New Target</h3>
        <div style="display: flex; gap: 8px;">
            <input type="text" id="new-id" placeholder="id (e.g. abbas)" style="flex: 1; padding: 8px; border: 1px solid #ddd; border-radius: 6px;">
            <input type="url" id="new-url" placeholder="url (https://...)" style="flex: 2; padding: 8px; border: 1px solid #ddd; border-radius: 6px;">
            <button onclick="addProxy()" style="padding: 0 16px; background: #3498db; color: white; border: none; border-radius: 6px; cursor: pointer; font-weight: bold;">Add</button>
        </div>
    </div>

    <div id="proxy-list">Loading proxies...</div>
</div>
<div class="toast" id="toast"></div>

<script>
    const API_URL = '/admin/proxies';

    function showToast(msg) {
        const t = document.getElementById('toast');
        t.textContent = msg;
        t.classList.add('show');
        setTimeout(() => t.classList.remove('show'), 2500);
    }

    async function addProxy() {
        const id = document.getElementById('new-id').value.trim().toLowerCase();
        const url = document.getElementById('new-url').value.trim();
        
        if (!id || !url) return alert('ID and URL are required');
        
        try {
            const res = await fetch(API_URL, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ id, url, isEnabled: true })
            });
            
            if (res.status === 409) return alert('ID already exists');
            if (!res.ok) throw new Error();
            
            document.getElementById('new-id').value = '';
            document.getElementById('new-url').value = '';
            showToast(`Added ${id}`);
            loadProxies();
        } catch (err) {
            alert('Failed to add proxy');
        }
    }

    async function deleteProxy(id) {
        if (!confirm(`Delete ${id}?`)) return;
        try {
            await fetch(`${API_URL}/${id}`, { method: 'DELETE' });
            showToast(`Deleted ${id}`);
            loadProxies();
        } catch (err) {
            alert('Failed to delete');
        }
    }

    async function loadProxies() {
        try {
            const res = await fetch(API_URL);
            const proxies = await res.json();
            const list = document.getElementById('proxy-list');
            list.innerHTML = '';

            proxies.forEach(proxy => {
                const item = document.createElement('div');
                item.className = 'proxy-item';
                item.innerHTML = `
                    <div class="proxy-row">
                        <div class="info">
                            <span class="id">${proxy.id}</span>
                            <span class="url" id="url-${proxy.id}">${proxy.url}</span>
                        </div>
                        <div class="actions">
                            <button class="edit-btn" title="Edit URL" onclick="toggleEdit('${proxy.id}')">✏️</button>
                            <button class="edit-btn" title="Delete" onclick="deleteProxy('${proxy.id}')" style="color: #e74c3c;">🗑️</button>
                            <label class="switch">
                                <input type="checkbox" ${proxy.isEnabled ? 'checked' : ''} onchange="toggleProxy('${proxy.id}', this.checked)">
                                <span class="slider"></span>
                            </label>
                        </div>
                    </div>
                    <div class="edit-form" id="edit-${proxy.id}">
                        <input type="url" id="input-${proxy.id}" value="${proxy.url}" placeholder="https://...">
                        <button class="save-btn" onclick="saveUrl('${proxy.id}')">Save</button>
                        <button class="cancel-btn" onclick="toggleEdit('${proxy.id}')">Cancel</button>
                    </div>
                `;
                list.appendChild(item);
            });
        } catch (err) {
            document.getElementById('proxy-list').innerText = 'Failed to load proxies. Is the server running?';
        }
    }

    function toggleEdit(id) {
        const form = document.getElementById(`edit-${id}`);
        form.classList.toggle('open');
        if (form.classList.contains('open')) {
            document.getElementById(`input-${id}`).focus();
        }
    }

    async function saveUrl(id) {
        const url = document.getElementById(`input-${id}`).value.trim();
        if (!url) return alert('URL cannot be empty');
        try {
            await fetch(`${API_URL}/${id}`, {
                method: 'PATCH',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ url })
            });
            document.getElementById(`url-${id}`).textContent = url;
            toggleEdit(id);
            showToast(`${id} URL updated`);
        } catch (err) {
            alert('Failed to update URL');
        }
    }

    async function toggleProxy(id, isEnabled) {
        try {
            await fetch(`${API_URL}/${id}`, {
                method: 'PATCH',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ isEnabled })
            });
            showToast(`${id} ${isEnabled ? 'enabled' : 'disabled'}`);
        } catch (err) {
            alert('Failed to update proxy status');
            loadProxies();
        }
    }

    loadProxies();
</script>

</body>
</html>
